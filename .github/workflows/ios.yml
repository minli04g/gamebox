name: iOS TestFlight

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      lane:
        description: 'fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options: [beta, create_app, init_signing]

jobs:
  ios:
    runs-on: macos-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/packages/app/Gemfile
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@v4

      # Loads the deploy key so fastlane match can clone/push the private certs
      # repo over SSH (also adds github.com to known_hosts).
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_KEY }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      # The heavy Flutter/CocoaPods steps are only needed to archive (beta lane
      # or a tag push). create_app / init_signing just talk to Apple's APIs.
      - name: Prepare Flutter iOS build
        if: ${{ github.event_name == 'push' || github.event.inputs.lane == 'beta' }}
        run: |
          flutter pub get
          # Generate ios/Flutter/Generated.xcconfig so the Podfile + Xcode build
          # phase can resolve FLUTTER_ROOT and drive the Flutter assemble.
          flutter build ios --release --no-codesign --config-only
          pod install --project-directory=ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Fastlane ${{ github.event.inputs.lane || 'beta' }}
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
