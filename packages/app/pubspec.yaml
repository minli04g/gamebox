name: gamebox
description: GameBox — a personal, offline cross-platform game collection.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  game_core:
    path: ../game_core
  sudoku:
    path: ../games/sudoku
  game_2048:
    path: ../games/game_2048
  minesweeper:
    path: ../games/minesweeper
  klotski:
    path: ../games/klotski
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
